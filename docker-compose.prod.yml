# Один сервер: приложение + Postgres + Redis + MinIO в контейнерах (без отдельных managed-сервисов).
# Деплой: docker compose -f docker-compose.prod.yml up -d
# Опционально .env: POSTGRES_PASSWORD, MINIO_*; JWT берётся из application.conf, свой JWT — добавь в app.environment: JWT_SECRET: ...
#
# Образ из CI (приватный репозиторий): docker login ghcr.io -u USER -p <PAT>

services:
  app:
    image: ghcr.io/jenyasubbotina/travel_planner_server:latest
    pull_policy: always
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command: >
      export DATABASE_URL=jdbc:postgresql://postgres:5432/travel_planner
      && export DATABASE_USER="$${DATABASE_USER:-tp_user}"
      && export DATABASE_PASSWORD="$${DATABASE_PASSWORD:-tp_pass}"
      && export REDIS_HOST="$${REDIS_HOST:-redis}"
      && export REDIS_PORT="$${REDIS_PORT:-6379}"
      && export S3_ENDPOINT="$${S3_ENDPOINT:-http://minio:9000}"
      && export S3_ACCESS_KEY="$${S3_ACCESS_KEY:-minioadmin}"
      && export S3_SECRET_KEY="$${S3_SECRET_KEY:-minioadmin}"
      && export S3_BUCKET="$${S3_BUCKET:-travel-planner}"
      && export S3_REGION="$${S3_REGION:-us-east-1}"
      && exec java -jar app.jar
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    # Список KEY=value — дублирует дефолты; реальные значения подхватывает sh из command выше.
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/travel_planner
      - DATABASE_USER=${POSTGRES_USER:-tp_user}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-tp_pass}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET=travel-planner
      - S3_REGION=us-east-1

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travel_planner
      POSTGRES_USER: ${POSTGRES_USER:-tp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tp_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tp_user} -d travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
