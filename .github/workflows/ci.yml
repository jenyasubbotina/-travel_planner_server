name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Tests and fat JAR (DB schema check via Testcontainers)
        run: ./gradlew test buildFatJar --no-daemon

      - name: Upload runnable fat JAR (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: travel-planner-server-jar
          path: build/libs/*-all.jar
          if-no-files-found: error
          retention-days: 30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # github.repository can be owner/-repo — a leading "-" in the image path is invalid OCI reference format.
      - name: Normalize GHCR image name
        id: ghcr_image
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          name='${{ github.event.repository.name }}'
          sanitized=$(printf '%s' "$name" | sed 's/^[._-]*//' | tr '[:upper:]' '[:lower:]')
          [ -n "$sanitized" ] || sanitized=app
          echo "image=ghcr.io/${owner}/${sanitized}" >> "$GITHUB_OUTPUT"

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr_image.outputs.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
