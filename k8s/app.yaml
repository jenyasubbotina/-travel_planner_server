apiVersion: v1
kind: Service
metadata:
  name: travel-planner-api
  namespace: travel-planner
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: travel-planner-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel-planner-api
  namespace: travel-planner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travel-planner-api
  template:
    metadata:
      labels:
        app: travel-planner-api
    spec:
      containers:
        - name: api
          # Build locally: docker build -t travel-planner-server:local .
          # minikube image load travel-planner-server:local
          image: travel-planner-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/travel_planner
            - name: DATABASE_USER
              value: tp_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: travel-planner-secrets
                  key: database-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: travel-planner-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: S3_ENDPOINT
              value: http://minio:9000
            - name: S3_ACCESS_KEY
              value: minioadmin
            - name: S3_SECRET_KEY
              value: minioadmin
            - name: S3_BUCKET
              value: travel-planner
            - name: S3_REGION
              value: us-east-1
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
