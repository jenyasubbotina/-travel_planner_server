ktor {
    deployment {
        port = 8080
        port = ${?SERVER_PORT}
        host = "0.0.0.0"
        host = ${?SERVER_HOST}
    }
    application {
        modules = [com.travelplanner.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5433/travel_planner"
    url = ${?DATABASE_URL}
    user = "tp_user"
    user = ${?DATABASE_USER}
    password = "tp_pass"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = "change-me-to-a-secure-random-string-at-least-32-chars"
    secret = ${?JWT_SECRET}
    issuer = "travel-planner"
    issuer = ${?JWT_ISSUER}
    audience = "travel-planner-client"
    audience = ${?JWT_AUDIENCE}
    accessTokenExpiryMinutes = 30
    accessTokenExpiryMinutes = ${?JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
    refreshTokenExpiryDays = 30
    refreshTokenExpiryDays = ${?JWT_REFRESH_TOKEN_EXPIRY_DAYS}
}

redis {
    host = "localhost"
    host = ${?REDIS_HOST}
    port = 6379
    port = ${?REDIS_PORT}
}

s3 {
    endpoint = "http://localhost:9000"
    endpoint = ${?S3_ENDPOINT}
    publicEndpoint = "http://192.168.50.77:9000"
    accessKey = "minioadmin"
    accessKey = ${?S3_ACCESS_KEY}
    secretKey = "minioadmin"
    secretKey = ${?S3_SECRET_KEY}
    bucket = "travel-planner"
    bucket = ${?S3_BUCKET}
    region = "us-east-1"
    region = ${?S3_REGION}
}

fcm {
    serviceAccountPath = "F:/Downloaded/tp-dev-artyo-firebase-adminsdk-fbsvc-a345857526.json"
    serviceAccountPath = ${?FCM_SERVICE_ACCOUNT_PATH}
}

admin {
    enabled = true
    enabled = ${?DEBUG_ADMIN_ENABLED}
    bindLocalhostOnly = true
    bindLocalhostOnly = ${?DEBUG_ADMIN_LOCALHOST_ONLY}
}
